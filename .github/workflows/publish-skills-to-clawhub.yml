name: Publish Skills to ClawHub

# Publishes the skill folders under app-skills/ to ClawHub, using each skill's
# declared metadata.version (from its SKILL.md frontmatter) as the published
# version — NOT ClawHub's default registry+bump auto-versioning.
#
# How it works:
#   1. `clawhub sync --dry-run --json` detects which skills are new or changed
#      (scoped to app-skills/ only, so other directories are never published).
#   2. contrib/scripts/clawhub_publish.ts reads metadata.version from each
#      changed skill and runs `clawhub publish <folder> --version <metadata.version>`.
#   3. A changed skill whose metadata.version was NOT bumped above the published
#      version aborts the run — bump metadata.version in its SKILL.md to publish.
#
# The ClawHub CLI is run from source (openclaw/clawhub, pinned commit) because the
# published npm release does not yet support `sync --json`, which step 1 relies on.
#
# Run it from the Actions tab ("Run workflow") and pick a mode:
#   dry-run         Preview the plan (which skills, at which version). No upload.
#   publish-single  Publish one folder, e.g. app-skills/<slug>.
#   publish-catalog Publish every new/changed skill under app-skills/.
#
# ClawHub caps NEW-skill publishes at 5 per hour, so a large publish-catalog run fails once the
# 6th new skill is rejected. When that happens, drain the rest 5-at-a-time on a schedule with
# .github/workflows/drip-publish-skills-to-clawhub.yml.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: What to run.
        type: choice
        required: true
        default: dry-run
        options:
          - dry-run
          - publish-single
          - publish-catalog
      skill_path:
        description: Skill folder for publish-single, for example app-skills/<slug>.
        type: string
        required: false
        default: ""
      generate_changelog:
        description: Generate each skill's changelog with codex exec (one run per skill). Off uses a plain changelog.
        type: boolean
        required: false
        default: true

permissions:
  contents: read

env:
  # The published npm clawhub release lacks `sync --json`, so the CLI is run from
  # source. Pin to a commit of openclaw/clawhub; bump to adopt newer CLI behavior.
  CLAWHUB_SOURCE_REPO: openclaw/clawhub
  CLAWHUB_SOURCE_REF: dcbc38999f1a7bae27187e236e28dbc4c605051a
  CLAWHUB_OWNER: oomol
  SKILLS_ROOT: app-skills
  CLAWHUB_REGISTRY: https://clawhub.ai
  CLAWHUB_SITE: https://clawhub.ai
  # Codex CLI (changelog generation). Model/effort are fixed config; the API key and
  # base URL are NOT hardcoded — they come from secrets.OPENAI_API_KEY / secrets.CODEX_BASE_URL.
  CODEX_CLI_VERSION: 0.135.0
  CODEX_MODEL: gpt-5.5
  CODEX_EFFORT: medium
  CODEX_PROVIDER: oomol
  CODEX_WIRE_API: responses
  CODEX_API_KEY_ENV: OPENAI_API_KEY

jobs:
  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Generous: changelogs are pre-generated in parallel (default 10 at a time, ~20s each at
    # effort=medium) and cached across re-runs, but a first-time catalog publish of hundreds
    # of skills can still take a while. Job hard-limit on hosted runners is 6h.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        env:
          MODE: ${{ inputs.mode }}
          SKILL_PATH: ${{ inputs.skill_path }}
        run: |
          set -euo pipefail
          if [[ "$MODE" == "publish-single" ]]; then
            if [[ -z "$SKILL_PATH" ]]; then
              echo "::error::skill_path is required when mode is publish-single."
              exit 1
            fi
            case "$SKILL_PATH" in
              "$SKILLS_ROOT"/*) ;;
              *)
                echo "::error::skill_path must point under $SKILLS_ROOT/, for example $SKILLS_ROOT/<slug>."
                exit 1
                ;;
            esac
            if [[ ! -f "${SKILL_PATH%/}/SKILL.md" ]]; then
              echo "::error::No SKILL.md found at ${SKILL_PATH%/}/SKILL.md."
              exit 1
            fi
          fi

      # Node runs the codex CLI (npm); Bun runs the ClawHub CLI from source and the orchestrator.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Check out ClawHub CLI source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CLAWHUB_SOURCE_REPO }}
          ref: ${{ env.CLAWHUB_SOURCE_REF }}
          path: clawhub-source

      - name: Install ClawHub CLI from source
        run: |
          set -euo pipefail
          ( cd clawhub-source && bun install --frozen-lockfile )
          mkdir -p "$RUNNER_TEMP/bin"
          cat > "$RUNNER_TEMP/bin/clawhub" <<EOF
          #!/usr/bin/env bash
          exec bun "$GITHUB_WORKSPACE/clawhub-source/packages/clawhub/src/cli.ts" "\$@"
          EOF
          chmod +x "$RUNNER_TEMP/bin/clawhub"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install Codex CLI
        if: inputs.mode != 'dry-run' && inputs.generate_changelog
        run: npm install -g "@openai/codex@${CODEX_CLI_VERSION}"

      - name: Configure ClawHub auth
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CLAWHUB_TOKEN:-}" ]]; then
            echo "::error::Missing secret CLAWHUB_TOKEN"
            exit 1
          fi
          config_path="${RUNNER_TEMP}/clawhub-config.json"
          jq -n --arg registry "$CLAWHUB_REGISTRY" --arg token "$CLAWHUB_TOKEN" \
            '{registry: $registry, token: $token}' > "$config_path"
          echo "CLAWHUB_CONFIG_PATH=$config_path" >> "$GITHUB_ENV"

      - name: Diff skills against the registry
        run: |
          set -euo pipefail
          # Registry check phase is per-skill; clawhub caps concurrency at 16 (default 4).
          clawhub \
            --workdir "$SKILLS_ROOT" \
            --dir . \
            --registry "$CLAWHUB_REGISTRY" \
            --site "$CLAWHUB_SITE" \
            --no-input \
            sync --all --json --no-clawdbot-roots --dry-run --concurrency 16 \
            | tee "${RUNNER_TEMP}/clawhub-sync.json"

      # Restore previously-generated changelogs so a re-run (or a publish of an unchanged
      # skill) reuses them instead of paying for codex again. Cache keys are immutable, so
      # the key is unique per attempt and restore-keys pulls the most recent prior snapshot
      # to seed it — that way a re-run after a partial/failed attempt keeps its progress.
      # On Blacksmith runners actions/cache transparently uses Blacksmith's colocated cache.
      - name: Restore changelog cache
        if: inputs.mode != 'dry-run' && inputs.generate_changelog
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/changelog-cache
          key: changelog-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            changelog-

      # Generate every publishable skill's changelog up front, in parallel (default 10 at a
      # time), writing each to a content-addressed file in the cache dir. codex runs ONLY
      # here — best-effort, so a failure for one skill never blocks the publish. The publish
      # step below reads these by the same content hash.
      - name: Generate changelogs (parallel)
        if: inputs.mode != 'dry-run' && inputs.generate_changelog
        env:
          MODE: ${{ inputs.mode }}
          SKILL_PATH: ${{ inputs.skill_path }}
          SYNC_JSON: ${{ runner.temp }}/clawhub-sync.json
          CHANGELOG_CACHE_DIR: ${{ runner.temp }}/changelog-cache
          CHANGELOG_CONCURRENCY: "10"
          CODEX_CHANGELOG_ENABLED: ${{ inputs.generate_changelog }}
          CODEX_BIN: codex
          # API key + base URL come from secrets only (never hardcoded in the repo).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_BASE_URL: ${{ secrets.CODEX_BASE_URL }}
        run: bun contrib/scripts/clawhub_changelog.ts

      # Persist the cache (even if a later step fails) so the next re-run starts from here.
      - name: Save changelog cache
        if: always() && inputs.mode != 'dry-run' && inputs.generate_changelog
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/changelog-cache
          key: changelog-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Publish using metadata.version
        env:
          MODE: ${{ inputs.mode }}
          SKILL_PATH: ${{ inputs.skill_path }}
          SYNC_JSON: ${{ runner.temp }}/clawhub-sync.json
          CLAWHUB_BIN: clawhub
          # Changelogs were pre-generated in parallel above; publish just reads them from
          # this cache dir by content hash (a miss falls back to a plain changelog — publish
          # never runs codex itself, so this step stays fast and serial).
          CODEX_CHANGELOG_ENABLED: ${{ inputs.generate_changelog }}
          CHANGELOG_CACHE_DIR: ${{ runner.temp }}/changelog-cache
          CODEX_BIN: codex
          # API key + base URL come from secrets only (never hardcoded in the repo).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_BASE_URL: ${{ secrets.CODEX_BASE_URL }}
        run: bun contrib/scripts/clawhub_publish.ts

      - name: Upload sync diff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clawhub-sync-json
          path: ${{ runner.temp }}/clawhub-sync.json
          if-no-files-found: warn
